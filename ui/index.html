<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tóm tắt trang HTTPS</title>
  <link rel="stylesheet" href="./styles.css">
  <script>
    window.SUMMARY_API_URL = window.SUMMARY_API_URL || "/summary";
  </script>
</head>
<body>
  <main>
    <div class="intro">
      <h1>Tóm tắt trang HTTPS</h1>
      <p class="lead">Nhập một đường link HTTPS để lấy nội dung trang và hiển thị bản tóm tắt</p>
    </div>

    <section class="tool" aria-label="Công cụ tóm tắt">
      <form id="summary-form" novalidate>
        <div>
          <label for="url">Đường link</label>
          <input id="url" name="url" type="url" inputmode="url" autocomplete="url" placeholder="https://example.com/bai-viet" required>
        </div>
        <button id="submit" type="submit">Tóm tắt</button>
      </form>
      <div id="message" class="message" role="status"></div>
      <article id="result" class="result" aria-live="polite"></article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
